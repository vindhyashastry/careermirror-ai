services:
  # Backend FastAPI service
  - type: web
    name: careermirror-backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python -m spacy download en_core_web_md"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: careermirror-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false # Set this in the Render UI
      - key: PYTHON_VERSION
        value: 3.10.0

databases:
  - name: careermirror-db
    plan: free # Use 'standard' for production
